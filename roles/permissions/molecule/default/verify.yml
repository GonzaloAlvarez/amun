---
- name: Verify
  hosts: all
  tasks:
    - name: Get current username
      ansible.builtin.command: id -un
      register: current_user_result
      changed_when: false

    - name: Verify user exists in sudoers with NOPASSWD
      ansible.builtin.command: "grep '{{ current_user_result.stdout }} ALL=(ALL) NOPASSWD: ALL' /etc/sudoers"
      register: sudoers_check
      changed_when: false
      become: true
      failed_when: sudoers_check.rc != 0
