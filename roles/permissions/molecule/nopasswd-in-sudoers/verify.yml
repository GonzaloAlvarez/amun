---
- name: Verify (root inspection)
  hosts: all
  tasks:
    - name: Count NOPASSWD lines for testuser in /etc/sudoers
      ansible.builtin.shell: |
        set -o pipefail
        grep -cE '^\s*testuser\s+ALL=\(ALL\)\s+NOPASSWD:\s*ALL\s*$' /etc/sudoers || true
      args:
        executable: /bin/bash
      register: nopasswd_count
      changed_when: false

    - name: Assert exactly one NOPASSWD line for testuser (no duplicate)
      ansible.builtin.assert:
        that:
          - nopasswd_count.stdout | int == 1
        fail_msg: >-
          Expected exactly one NOPASSWD line for testuser in /etc/sudoers
          (prepare wrote it; role should be idempotent and not duplicate).
          Found {{ nopasswd_count.stdout }}.

- name: Verify (as testuser — visudo under become works without password)
  hosts: all
  vars:
    ansible_user: testuser
  tasks:
    - name: Run visudo -cf under become as testuser
      ansible.builtin.command: /usr/sbin/visudo -cf /etc/sudoers
      become: true
      register: visudo_check
      changed_when: false

    - name: Assert visudo -cf succeeded under become without a password prompt
      ansible.builtin.assert:
        that:
          - visudo_check.rc == 0
        fail_msg: >-
          visudo -cf returned rc={{ visudo_check.rc }} under become.
