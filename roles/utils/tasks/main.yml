---
- name: Update and upgrade packages
  apt:
    upgrade: full
    update_cache: yes
    allow_downgrade: yes
    autoclean: yes
    autoremove: yes
  become: true
  retries: 5
  delay: 5
  register: result
  until: result is not failed
  when: ansible_facts['os_family'] == 'Debian'

- name: Ensure the different utilities are installed (mac)
  community.general.homebrew:
    name: "{{ homebrew_packages }}"
    state: present
    update_homebrew: true
  when: ansible_facts['os_family'] == 'Darwin'

- name: Ensure the extra utilities are installed (mac)
  community.general.homebrew_cask:
    name: "{{ item }}"
    state: present
  loop: "{{ homebrew_cask_packages }}"
  ignore_errors: true
  when: ansible_facts['os_family'] == 'Darwin'

- name: Ensure the different utilitis are installed (linux)
  package:
    name: "{{ linux_packages }}"
    state: present
  become: true
  when: ansible_facts['os_family'] == 'Debian'

- name: Ensure neovim meets minimum version requirements (Debian)
  import_tasks: debian_neovim.yml
  when:
    - ansible_facts['os_family'] == 'Debian'
    - ansible_facts['distribution'] != 'Ubuntu'

- name: Install neovim from PPA (Ubuntu)
  import_tasks: ubuntu_neovim.yml
  when: ansible_facts['distribution'] == 'Ubuntu'

- name: Update packages (Arch)
  community.general.pacman:
    update_cache: yes
    upgrade: yes
  become: true
  when: ansible_facts['os_family'] == 'Archlinux'

- name: Install packages (Arch)
  community.general.pacman:
    name: "{{ arch_packages }}"
    state: present
  become: true
  when: ansible_facts['os_family'] == 'Archlinux'

- name: Find neovim binary path
  command: which nvim
  register: nvim_path_result
  changed_when: false
  failed_when: false
  when: ansible_facts['os_family'] in ['Debian', 'Archlinux']

- name: Set neovim binary path
  set_fact:
    nvim_binary_path: "{{ nvim_path_result.stdout }}"
  when:
    - ansible_facts['os_family'] in ['Debian', 'Archlinux']
    - nvim_path_result.rc == 0

- name: Configure update-alternatives for nvim to point to neovim
  alternatives:
    name: nvim
    link: /usr/bin/nvim
    path: "{{ nvim_binary_path }}"
    priority: 60
  become: true
  when:
    - ansible_facts['os_family'] in ['Debian', 'Archlinux']
    - nvim_binary_path is defined
    - nvim_binary_path != '/usr/bin/nvim'

- name: Check if vim.nox exists
  stat:
    path: /usr/bin/vim.nox
  register: vim_nox_stat
  when: ansible_facts['os_family'] == 'Debian'

- name: Configure update-alternatives for vim and vi to point to vim.nox (Debian)
  alternatives:
    name: "{{ item }}"
    link: "/usr/bin/{{ item }}"
    path: /usr/bin/vim.nox
    priority: 60
  become: true
  loop:
    - vi
    - vim
  when:
    - ansible_facts['os_family'] == 'Debian'
    - vim_nox_stat.stat.exists

- name: Create vi symlink to vim (Arch)
  ansible.builtin.file:
    src: /usr/bin/vim
    dest: /usr/local/bin/vi
    state: link
  become: true
  when: ansible_facts['os_family'] == 'Archlinux'

- name: Install amun CLI
  import_tasks: all_amun.yml
