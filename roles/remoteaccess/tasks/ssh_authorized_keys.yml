---
- name: Get current username
  command: id -un
  register: current_user_result
  changed_when: false

- name: Set current_user fact
  set_fact:
    current_user: "{{ current_user_result.stdout }}"

- name: Ensure ~/.ssh directory exists with correct permissions
  file:
    path: "{{ ansible_facts['env']['HOME'] }}/.ssh"
    state: directory
    mode: "0700"
    owner: "{{ current_user }}"

- name: Fetch SSH public key from GitHub
  uri:
    url: "{{ ssh_pubkey_url }}"
    return_content: true
  register: ssh_pubkey_response
  changed_when: false

- name: Add SSH public key to authorized_keys
  ansible.posix.authorized_key:
    user: "{{ current_user }}"
    key: "{{ ssh_pubkey_response.content | trim }}"
    state: present
