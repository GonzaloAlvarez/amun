---
- name: Prepare
  hosts: all
  tasks:
    - name: Ensure apt is available
      ansible.builtin.wait_for:
        path: /usr/bin/apt
        state: present
        timeout: 10

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      become: true
